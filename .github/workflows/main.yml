name: FF_GLORY_BOT

on:
  workflow_dispatch: # Yahi wo line hai jo "Run Workflow" button laati hai

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Start Bot
        run: python main.py
